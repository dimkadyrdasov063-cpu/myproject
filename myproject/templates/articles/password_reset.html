{% extends "articles/base.html" %}
{% block title %}Сброс пароля{% endblock %}

{% block content %}
<style>
    .auth-box {
        max-width: 400px;
        margin: 40px auto;
        background-color: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        padding: 36px 32px;
    }
    .auth-box h2 { text-align: center; font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .auth-box .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 24px; }
    .auth-box p { margin-bottom: 16px; }
    .auth-box label { display: block; font-size: 13px; color: #888; margin-bottom: 5px; }
    .auth-box input { width: 100%; background-color: #222; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; padding: 10px 12px; font-size: 14px; outline: none; }
    .auth-box input:focus { border-color: #7c6af7; }
</style>

<div class="auth-box">
    <h2>Сброс пароля</h2>
    <p class="subtitle">Введите email и мы отправим ссылку</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100 mt-2">Отправить</button>
    </form>

    <div class="text-center mt-3">
        <a href="{% url 'articles:login' %}" style="color: #666; font-size: 13px; text-decoration: none;">← Назад ко входу</a>
    </div>
</div>
{% endblock %}
