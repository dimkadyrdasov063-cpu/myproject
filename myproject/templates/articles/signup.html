{% extends "articles/base.html" %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<style>
    .auth-box {
        max-width: 400px;
        margin: 40px auto;
        background-color: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        padding: 36px 32px;
    }
    .auth-box h2 {
        text-align: center;
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 24px;
    }
    .auth-box p { margin-bottom: 16px; }
    .auth-box label {
        display: block;
        font-size: 13px;
        color: #888;
        margin-bottom: 5px;
    }
    .auth-box input {
        width: 100%;
        background-color: #222;
        border: 1px solid #333;
        border-radius: 8px;
        color: #e0e0e0;
        padding: 10px 12px;
        font-size: 14px;
        outline: none;
    }
    .auth-box input:focus {
        border-color: #7c6af7;
    }
    .errorlist {
        list-style: none;
        padding: 0;
        margin: 4px 0 0;
        font-size: 12px;
        color: #f87171;
    }
    .helptext {
        font-size: 11px;
        color: #555;
        margin-top: 3px;
        display: block;
    }
</style>

<div class="auth-box">
    <h2>Регистрация</h2>

    {% if form.non_field_errors %}
        <div class="alert alert-danger p-2" style="font-size:13px;">
            {{ form.non_field_errors }}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100 mt-2">Создать аккаунт</button>
    </form>

    <div class="text-center mt-3" style="font-size:13px;">
        <a href="{% url 'articles:login' %}" style="color: #888; text-decoration:none;">
            Уже есть аккаунт? Войти
        </a>
    </div>
</div>
{% endblock %}
